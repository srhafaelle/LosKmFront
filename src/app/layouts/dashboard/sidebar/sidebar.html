<!-- Botón Hamburguesa (Solo visible en móvil) -->

<!-- Backdrop para cerrar el menú haciendo clic fuera (Solo móvil) -->
@if (sidebar.isOpen()) {
    <div class="sidebar-backdrop" (click)="sidebar.closeMenu()"></div>
}

<!-- Sidebar Principal -->
<aside class="sidebar-container" [class.open]="sidebar.isOpen()">
    <div class="sidebar-header">
        <h2>SAO Admin</h2>
        <button class="close-btn" (click)="sidebar.closeMenu()" aria-label="Cerrar menú">
            &times;
        </button>
    </div>

    <nav class="sidebar-nav">
        <ul>
            @for (item of menuItems; track item.route) {
                <li>
                    <a
                        [routerLink]="item.route"
                        routerLinkActive="active-route"
                        (click)="sidebar.closeMenu()"
                    >
                        <ng-icon [name]="item.icon"></ng-icon>
                        {{ item.label }}
                    </a>
                </li>
            }
        </ul>
    </nav>

    <div class="sidebar-footer">
        <h2>SAO Admin</h2>
    </div>
</aside>
