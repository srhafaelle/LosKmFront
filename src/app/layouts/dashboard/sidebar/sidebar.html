<aside class="sidebar-container">
    <!-- Header: Contiene el logo de la CVM -->
    <!-- Lista de los links de las páginas del sistema -->
    <!-- Footer: solo contiene el botón de cerrar sesión -->
</aside>

<!-- Desde Gemini -->
<!-- Botón Hamburguesa (Solo visible en móvil) -->
<button class="mobile-toggle-btn" (click)="toggleMenu()" aria-label="Alternar menú">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
</button>

<!-- Backdrop para cerrar el menú haciendo clic fuera (Solo móvil) -->
@if (isMobileMenuOpen()) {
    <div class="sidebar-backdrop" (click)="closeMenu()"></div>
}

<!-- Sidebar Principal -->
<aside class="sidebar-container" [class.open]="isMobileMenuOpen()">
    <div class="sidebar-header">
        <h2>SAO Admin</h2>
        <button class="close-btn" (click)="closeMenu()" aria-label="Cerrar menú">&times;</button>
    </div>

    <nav class="sidebar-nav">
        <ul>
            @for (item of menuItems; track item.route) {
                <li>
                    <a
                        [routerLink]="item.route"
                        routerLinkActive="active-route"
                        (click)="closeMenu()"
                    >
                        <span class="icon">{{ item.icon }}</span>
                        {{ item.label }}
                    </a>
                </li>
            }
        </ul>
    </nav>
</aside>
