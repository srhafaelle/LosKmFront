<ui-card class="login-card">
    <form action="" class="login-container" [formGroup]="loginForm" (ngSubmit)="logIn()">
        <img ngSrc="cvm-logo-169.png" width="300" height="168.8" />
        <div class="divider"></div>
        <div class="input-elements">
            <ui-input
                label="Correo Electrónico"
                placeholder="usuario@cvm.com.ve"
                icon="bootstrapPerson"
                formControlName="email"
                [errorMessage]="emailError()"
            />
            <ui-input
                label="Contraseña"
                type="password"
                icon="bootstrapKey"
                formControlName="password"
                [errorMessage]="passwordError()"
            />
        </div>
        <div class="action-elements">
            <ui-button type="submit">Iniciar sesión</ui-button>
            <p>¿No tienes cuenta? Registrate <span class="register-link">aquí</span></p>
        </div>
    </form>
</ui-card>
