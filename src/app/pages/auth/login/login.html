<ui-card class="login-card">
    <form action="" class="login-container">
        <img ngSrc="cvm-logo.png" width="250" height="250" />
        <div class="input-elements">
            <ui-input placeholder="Correo" icon="bootstrapPerson" />
            <ui-input placeholder="Contraseña" type="password" icon="bootstrapKey" />
        </div>
        <div class="action-elements">
            <ui-button>Iniciar sesión</ui-button>
            <p>¿No tienes cuenta? Registrate <span class="register-link">aquí</span></p>
        </div>
    </form>
</ui-card>
