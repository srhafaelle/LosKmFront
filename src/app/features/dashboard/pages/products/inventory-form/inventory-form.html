<ui-modal [isOpen]="isOpen()" (close)="closeModal()">
    <h3 modal-header>Ingresar inventario</h3>

    <form action="" modal-body [formGroup]="insertStockForm" (ngSubmit)="insertStock()">
        <input type="hidden" [value]="distributionValue()?.value" formControlName="receptorId" />
        <ui-select
            placeholder="Punto de distribución (receptor)"
            [options]="distributionOptions()"
            [(selectedValue)]="distributionValue"
        >
        </ui-select>

        <ui-input label="Cantidad">
            <input
                type="text"
                inputmode="numeric"
                pattern="[0-9]*"
                formControlName="quantity"
                appNumberOnly
                [allowDecimals]="true"
            />
        </ui-input>

        <ui-input label="Número de factura">
            <input
                type="text"
                inputmode="numeric"
                pattern="[0-9]*"
                formControlName="recipt"
                appNumberOnly
            />
        </ui-input>

        <ui-button type="submit" kind="primary">Ingresar</ui-button>
    </form>
</ui-modal>
